<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>[分享标题] · [项目名]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1b26;
      --bg-alt: #22232f;
      --fg: #f8f8f2;
      --muted: #6272a4;
      --purple: #bd93f9;
      --cyan: #8be9fd;
      --green: #50fa7b;
      --orange: #ffb86c;
      --pink: #ff79c6;
      --yellow: #f1fa8c;
      --red: #ff5555;
      --border: rgba(98, 114, 164, 0.35);
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      --font: "DM Sans", system-ui, -apple-system, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 58% 48% at 0% 0%, rgba(189, 147, 249, 0.11), transparent 58%),
        radial-gradient(ellipse 52% 46% at 100% 0%, rgba(255, 121, 198, 0.07), transparent 56%),
        radial-gradient(ellipse 48% 52% at 0% 100%, rgba(139, 233, 253, 0.09), transparent 58%),
        radial-gradient(ellipse 55% 44% at 100% 100%, rgba(80, 250, 123, 0.05), transparent 60%),
        radial-gradient(ellipse 70% 60% at 50% 42%, rgba(98, 114, 164, 0.06), transparent 68%),
        repeating-linear-gradient(-17deg, transparent 0, transparent 34px, rgba(98, 114, 164, 0.038) 34px, rgba(98, 114, 164, 0.038) 35px);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 85% 70% at 72% 28%, rgba(139, 233, 253, 0.07), transparent 55%),
        radial-gradient(ellipse 90% 75% at 18% 78%, rgba(189, 147, 249, 0.055), transparent 58%),
        radial-gradient(ellipse 95% 45% at 50% 102%, rgba(98, 114, 164, 0.05), transparent 48%),
        linear-gradient(118deg, rgba(255, 184, 108, 0.028) 0%, transparent 24%, transparent 50%, rgba(189, 147, 249, 0.035) 72%, rgba(139, 233, 253, 0.03) 100%);
      opacity: 0.88;
    }

    .deck {
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      position: relative;
      z-index: 1;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .deck::-webkit-scrollbar { width: 0; height: 0; display: none; }
    html.lightbox-open { overflow: hidden; }

    section.slide {
      scroll-snap-align: start;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 3.5rem) clamp(1.25rem, 5vw, 4rem);
      position: relative;
    }
    section.slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(189, 147, 249, 0.04), transparent 55%);
      pointer-events: none;
    }
    section.slide > .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .kicker {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    h1 {
      font-size: clamp(2.25rem, 5.5vw, 3.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
      line-height: 1.1;
    }
    h2 {
      font-size: clamp(1.65rem, 3.8vw, 2.35rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 1.25rem;
      color: var(--fg);
    }
    .sub { font-size: clamp(1rem, 2vw, 1.2rem); color: var(--muted); max-width: 36ch; }
    .cover-line { margin-top: 2rem; height: 3px; width: min(120px, 30vw); background: linear-gradient(90deg, var(--purple), var(--cyan)); border-radius: 2px; }
    .elevator { font-size: clamp(1.15rem, 2.4vw, 1.5rem); font-weight: 500; color: var(--cyan); max-width: 22em; line-height: 1.55; }
    .elevator span { color: var(--fg); }
    .elevator em { font-style: normal; color: var(--purple); }

    .grid-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: clamp(0.75rem, 2vw, 1.25rem); }
    .card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 2.5vw, 1.35rem);
      box-shadow: var(--shadow);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .card:hover { border-color: rgba(189, 147, 249, 0.45); transform: translateY(-2px); }
    .card h3 { margin: 0 0 0.65rem; font-size: 1rem; font-weight: 600; color: var(--orange); }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { font-family: var(--mono); font-size: 0.68rem; padding: 0.25rem 0.5rem; border-radius: 6px; background: rgba(98, 114, 164, 0.2); color: var(--cyan); }

    .screen-rows { display: flex; flex-direction: column; gap: clamp(0.65rem, 1.8vw, 1rem); }
    .screen-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: clamp(0.45rem, 1.2vw, 0.75rem); }
    .shot-tile {
      margin: 0; padding: 0; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-alt); cursor: zoom-in; text-align: left; font: inherit; color: inherit;
      overflow: hidden; display: block; aspect-ratio: 16 / 10;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .shot-tile:hover, .shot-tile:focus-visible {
      border-color: rgba(189, 147, 249, 0.5);
      box-shadow: 0 0 0 1px rgba(189, 147, 249, 0.25);
      transform: translateY(-1px);
      outline: none;
    }
    .shot-tile:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .shot-tile img { width: 100%; height: 78%; object-fit: cover; display: block; opacity: 0.94; transition: opacity 0.2s ease; }
    .shot-tile:hover img, .shot-tile:focus-visible img { opacity: 1; }
    .shot-tile .shot-cap {
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); padding: 0.35rem 0.45rem 0.4rem; text-align: center; border-top: 1px solid var(--border);
      height: 22%; box-sizing: border-box; line-height: 1.2;
    }

    .arch-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(1rem, 3vw, 2rem); align-items: stretch; }
    button.arch-panel {
      display: block; width: 100%; margin: 0; font: inherit; color: inherit; text-align: left; cursor: zoom-in;
      background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: clamp(1rem, 2vw, 1.25rem);
      box-shadow: var(--shadow); transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    button.arch-panel:hover, button.arch-panel:focus-visible {
      border-color: rgba(189, 147, 249, 0.5); box-shadow: 0 0 0 1px rgba(189, 147, 249, 0.22), var(--shadow); transform: translateY(-2px); outline: none;
    }
    button.arch-panel:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .arch-panel h3 { margin: 0 0 0.75rem; font-size: 0.85rem; font-weight: 600; color: var(--green); font-family: var(--mono); letter-spacing: 0.04em; }
    .arch-panel svg { width: 100%; height: auto; display: block; }

    .cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(1rem, 2.5vw, 1.5rem); }
    .col {
      background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: clamp(1rem, 2vw, 1.35rem);
      box-shadow: var(--shadow); transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .col:hover { border-color: rgba(189, 147, 249, 0.45); box-shadow: 0 0 0 1px rgba(189, 147, 249, 0.18), var(--shadow); transform: translateY(-2px); }
    .col h3 { margin: 0 0 0.85rem; font-size: 0.95rem; color: var(--pink); font-weight: 600; }
    .col ul { margin: 0; padding: 0; list-style: none; }
    .col li { position: relative; padding-left: 1rem; margin-bottom: 0.55rem; font-size: 0.88rem; color: var(--fg); opacity: 0.92; }
    .col li::before { content: ""; position: absolute; left: 0; top: 0.55em; width: 5px; height: 5px; border-radius: 50%; background: var(--purple); }

    .take-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(1rem, 2.5vw, 1.5rem); }
    .take {
      text-align: center; padding: clamp(1.25rem, 3vw, 1.75rem); border-radius: var(--radius); border: 1px solid var(--border);
      background: linear-gradient(160deg, var(--bg-alt), rgba(26, 27, 38, 0.72)); box-shadow: var(--shadow);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .take:hover { border-color: rgba(189, 147, 249, 0.45); box-shadow: 0 0 0 1px rgba(189, 147, 249, 0.18), var(--shadow); transform: translateY(-2px); }
    .take .label { font-size: clamp(1rem, 2.2vw, 1.2rem); font-weight: 700; letter-spacing: 0.04em; color: var(--yellow); margin-bottom: clamp(0.85rem, 2vw, 1.1rem); }
    .take .kw { font-family: var(--font); font-size: clamp(0.92rem, 1.85vw, 1.05rem); font-weight: 500; color: rgba(248, 248, 242, 0.88); line-height: 1.55; letter-spacing: 0.01em; }
    .take .kw em { font-style: normal; color: var(--cyan); font-weight: 600; }

    .slide-thanks { justify-content: stretch; padding-bottom: clamp(1.5rem, 4vw, 2.75rem); }
    .slide-thanks > .inner { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; width: 100%; }
    .thanks-hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
    .thanks-title {
      font-size: clamp(2.75rem, 9vw, 4.25rem); font-weight: 700; letter-spacing: 0.08em; margin: 0 0 0.5rem; line-height: 1.05;
      background: linear-gradient(120deg, var(--purple), var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .thanks-foot { flex-shrink: 0; text-align: center; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); padding-top: clamp(1.25rem, 3vw, 2rem); border-top: 1px solid var(--border); margin-top: auto; }
    .thanks-foot a { color: var(--cyan); text-decoration: none; }
    .thanks-foot a:hover { text-decoration: underline; }

    .lightbox {
      position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: clamp(1rem, 4vw, 2.5rem); background: rgba(24, 25, 31, 0.88);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .lightbox.is-open { opacity: 1; visibility: visible; }
    .lightbox-inner {
      position: relative; max-width: min(1120px, 96vw); max-height: 90vh; max-height: 90dvh;
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem; z-index: 1;
    }
    .lightbox img {
      max-width: 100%; max-height: min(78vh, 78dvh); width: auto; height: auto; object-fit: contain;
      border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); background: var(--bg-alt);
    }
    .lightbox img.lightbox-img--diagram { max-height: min(82vh, 82dvh); width: min(920px, 94vw); max-width: 94vw; }
    .lightbox-cap { margin: 0; font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cyan); }
    .lightbox-close {
      position: absolute; top: clamp(-2.75rem, -2vw, -0.25rem); right: 0; width: 2.5rem; height: 2.5rem;
      border: 1px solid var(--border); border-radius: 50%; background: var(--bg-alt); color: var(--fg);
      font-size: 1.35rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .lightbox-close:hover, .lightbox-close:focus-visible { background: rgba(189, 147, 249, 0.15); border-color: var(--purple); outline: none; }
    .lightbox-backdrop { position: absolute; inset: 0; cursor: zoom-out; border: none; padding: 0; margin: 0; background: transparent; z-index: 0; }

    .nav-dots {
      position: fixed; right: clamp(0.75rem, 2vw, 1.25rem); top: 50%; transform: translateY(-50%); z-index: 50;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .nav-dots a {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted); opacity: 0.45; border: none; padding: 0; cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease; text-indent: -9999px; overflow: hidden; display: block;
    }
    .nav-dots a:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
    .nav-dots a.active { opacity: 1; background: var(--purple); transform: scale(1.25); }

{{COMPONENT_STYLES}}

    @media (max-width: 820px) {
      .grid-cards, .arch-wrap, .cols-3, .take-grid { grid-template-columns: 1fr; }
      .screen-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav-dots { top: auto; bottom: 1rem; right: 50%; transform: translateX(50%); flex-direction: row; }
    }
    @media (max-width: 520px) {
      .screen-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="nav-dots" aria-label="幻灯导航">
{{NAV_ITEMS}}
  </nav>

  <main class="deck" id="deck">
{{SECTIONS_HTML}}
  </main>

{{EXTRA_OVERLAYS}}

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="大图预览" aria-hidden="true">
    <button type="button" class="lightbox-backdrop" id="lightbox-backdrop" tabindex="-1" aria-label="关闭预览"></button>
    <div class="lightbox-inner">
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="关闭">×</button>
      <img id="lightbox-img" src="" alt="" />
      <p class="lightbox-cap" id="lightbox-cap"></p>
    </div>
  </div>

  <script>
    (function () {
      var deck = document.getElementById("deck");
      var dots = document.querySelectorAll(".nav-dots a");
      var ids = {{SECTION_IDS_JSON}};

      dots.forEach(function (dot, i) {
        dot.addEventListener("click", function (e) {
          e.preventDefault();
          var el = document.getElementById(ids[i]);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });

      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (!en.isIntersecting) return;
          var idx = ids.indexOf(en.target.id);
          if (idx < 0) return;
          dots.forEach(function (d, j) { d.classList.toggle("active", j === idx); });
        });
      }, { root: deck, threshold: 0.35, rootMargin: "-4% 0px -4% 0px" });

      ids.forEach(function (id) {
        var el = document.getElementById(id);
        if (el) obs.observe(el);
      });

      var lightbox = document.getElementById("lightbox");
      var lightboxImg = document.getElementById("lightbox-img");
      var lightboxCap = document.getElementById("lightbox-cap");
      var lightboxClose = document.getElementById("lightbox-close");
      var lightboxBackdrop = document.getElementById("lightbox-backdrop");
      var lastFocus = null;

      function openLightbox(src, cap) {
        if (!lightbox || !lightboxImg || !lightboxCap || !lightboxClose) return;
        lastFocus = document.activeElement;
        lightboxImg.classList.remove("lightbox-img--diagram");
        lightboxImg.src = src;
        lightboxImg.alt = cap || "预览";
        lightboxCap.textContent = cap || "";
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.documentElement.classList.add("lightbox-open");
        deck.style.overflow = "hidden";
        lightboxClose.focus();
      }

      function openLightboxSvg(svgEl, cap) {
        if (!lightbox || !lightboxImg || !lightboxCap || !lightboxClose) return;
        var str = new XMLSerializer().serializeToString(svgEl);
        if (str.indexOf("xmlns=") === -1) str = str.replace("<svg", '<svg xmlns="http://www.w3.org/2000/svg"');
        var uri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(str);
        lastFocus = document.activeElement;
        lightboxImg.classList.add("lightbox-img--diagram");
        lightboxImg.src = uri;
        lightboxImg.alt = cap || "流程图";
        lightboxCap.textContent = cap || "";
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.documentElement.classList.add("lightbox-open");
        deck.style.overflow = "hidden";
        lightboxClose.focus();
      }

      function closeLightbox() {
        if (!lightbox || !lightbox.classList.contains("is-open")) return;
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        document.documentElement.classList.remove("lightbox-open");
        deck.style.overflow = "";
        lightboxImg.classList.remove("lightbox-img--diagram");
        lightboxImg.removeAttribute("src");
        if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      }

      document.querySelectorAll(".shot-tile").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var src = btn.getAttribute("data-src");
          var cap = btn.getAttribute("data-cap") || "";
          if (src) openLightbox(src, cap);
        });
      });

      document.querySelectorAll(".arch-panel").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var svg = btn.querySelector("svg");
          var cap = btn.getAttribute("data-diagram-cap") || "";
          if (svg) openLightboxSvg(svg, cap);
        });
      });

      if (lightboxClose) lightboxClose.addEventListener("click", closeLightbox);
      if (lightboxBackdrop) lightboxBackdrop.addEventListener("click", closeLightbox);

{{COMPONENT_SCRIPTS}}

      document.addEventListener("keydown", function (e) {
        if (lightbox && lightbox.classList.contains("is-open")) {
          if (e.key === "Escape") { e.preventDefault(); closeLightbox(); }
          return;
        }
        if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
        var cur = 0;
        dots.forEach(function (d, j) { if (d.classList.contains("active")) cur = j; });
        if (e.key === "ArrowDown" || e.key === "PageDown") {
          e.preventDefault();
          if (cur < ids.length - 1) {
            var next = document.getElementById(ids[cur + 1]);
            if (next) next.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        } else if (e.key === "ArrowUp" || e.key === "PageUp") {
          e.preventDefault();
          if (cur > 0) {
            var prev = document.getElementById(ids[cur - 1]);
            if (prev) prev.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        } else if (e.key === "Home") {
          e.preventDefault();
          var first = document.getElementById(ids[0]);
          if (first) first.scrollIntoView({ behavior: "smooth", block: "start" });
        } else if (e.key === "End") {
          e.preventDefault();
          var last = document.getElementById(ids[ids.length - 1]);
          if (last) last.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });
    })();
  </script>
</body>
</html>
